name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          # Dummy values so Next.js build doesn't fail on missing env validation
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
          CRON_SECRET: ci_placeholder_secret
          AI_PROVIDER: anthropic
          ANTHROPIC_API_KEY: sk-ant-placeholder
          SEARCH_PROVIDER: tavily
          SEARCH_API_KEY: placeholder
          TWILIO_ACCOUNT_SID: ACplaceholder
          TWILIO_AUTH_TOKEN: placeholder
          TWILIO_WHATSAPP_FROM: "whatsapp:+14155238886"
          WHATSAPP_TO: "whatsapp:+33600000000"
